<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Clicker Oyunu</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0f2f5; padding-top: 50px; }
        #game-container { background: white; width: 300px; margin: 0 auto; padding: 20px; border-radius: 15px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #click-btn { font-size: 50px; cursor: pointer; transition: transform 0.1s; border: none; background: none; }
        #click-btn:active { transform: scale(0.9); }
        .stats { font-size: 24px; margin: 20px 0; font-weight: bold; }
        button.upgrade { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button.upgrade:disabled { background-color: #ccc; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Tıkla Kazandır!</h1>
        <div class="stats">Skor: <span id="score">0</span></div>
        
        <button id="click-btn">🔘</button>
        
        <div style="margin-top: 20px;">
            <p>Geliştirme (Maliyet: 10)</p>
            <button id="upgrade-btn" class="upgrade">Her Tık +1 Artır</button>
        </div>
    </div>

    <script>
        let score = 0;
        let pointsPerClick = 1;
        let upgradeCost = 10;

        const scoreDisplay = document.getElementById('score');
        const clickBtn = document.getElementById('click-btn');
        const upgradeBtn = document.getElementById('upgrade-btn');

        // Tıklama fonksiyonu
        clickBtn.addEventListener('click', () => {
            score += pointsPerClick;
            updateDisplay();
        });

        // Geliştirme satın alma
        upgradeBtn.addEventListener('click', () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                pointsPerClick++;
                upgradeCost = Math.round(upgradeCost * 1.5);
                upgradeBtn.innerText = `Her Tık +1 Artır (Maliyet: ${upgradeCost})`;
                updateDisplay();
            }
        });

        function updateDisplay() {
            scoreDisplay.innerText = score;
            upgradeBtn.disabled = score < upgradeCost;
        }
    </script>
</body>
</html>
